<section class="news-section">
    <div class="container py-5">
        <div class="section-header mb-5 text-center">
            <div class="section-eyebrow justify-content-center">
                <span class="eyebrow-dot"></span>
                Live Market Updates
            </div>
            <h2 class="section-title">Latest <span class="text-accent">News</span></h2>
            <p class="section-subtitle">Stay informed with the latest headlines moving the market.</p>
        </div>
        
        <div class="row">
            <div class="col-12">
                <app-news [newsType]="selectedType"></app-news>
            </div>
        </div>
    </div>
</section>
