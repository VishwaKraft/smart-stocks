<div class="news-grid-container" *ngIf="!requireLoader && latestNews && latestNews.length > 0">
    <div class="news-grid">
        <a *ngFor="let news of latestNews | slice:0:6" [href]="news.url" target="_blank" class="news-card">
            <div class="news-image-wrap" *ngIf="news.urlToImage">
                <img [src]="news.urlToImage" [alt]="news.title" class="news-image" onerror="this.style.display='none'">
                <div class="news-image-overlay"></div>
            </div>
            <div class="news-content">
                <div class="news-meta">
                    <span class="news-author" *ngIf="news.author"><mat-icon>edit</mat-icon> {{news.author}}</span>
                </div>
                <h3 class="news-title">{{news.title}}</h3>
                <p class="news-excerpt">{{news.description | slice:0:120}}{{news.description?.length > 120 ? '...' : ''}}</p>
                <div class="news-read-more">
                    Read Full Story <mat-icon>arrow_forward</mat-icon>
                </div>
            </div>
        </a>
    </div>
</div>

<div class="loading-state" *ngIf="requireLoader">
    <mat-progress-bar mode="indeterminate" color="primary"></mat-progress-bar>
    <p>Fetching latest market headlines...</p>
</div>

<div class="error-state" *ngIf="!requireLoader && errorMessage">
    <mat-icon>error_outline</mat-icon>
    <p>{{ errorMessage }}</p>
</div>
