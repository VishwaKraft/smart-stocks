<section class="py-5">
    <div class="wow fadeInUp container" data-wow-duration="1.5s">
        
        <div class="section-header text-center mb-5">
            <div class="section-eyebrow justify-content-center" style="display: flex; align-items: center; gap: 8px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--primary-color); margin-bottom: 0.75rem;">
                <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--primary-color); box-shadow: 0 0 8px var(--primary-glow);"></span>
                Platform Features
            </div>
            <h2 class="section-title" style="font-size: clamp(2rem, 3vw, 2.5rem); font-weight: 800; color: var(--heading-color); letter-spacing: -0.03em;">Why choose <span style="background: linear-gradient(135deg, var(--primary-color), var(--primary-color-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Herculean</span>?</h2>
        </div>

        <div class="row align-items-stretch">
            <app-cart class="col-md-6 mb-4 d-flex" iconName="feed" iconText="Get the latest news update on the market strategies to be ahead of the race. There is nothing worse than staying uninformed!" iconHeading="Find out latest stock news"></app-cart>
            <app-cart class="col-md-6 mb-4 d-flex" iconName="search" iconText="Get all the details of the stocks trending and the market values along with the analysis of the market risk." iconHeading="Discover new trending stocks"></app-cart>
        </div>
        <div class="row align-items-stretch">
            <app-cart class="col-md-6 mb-4 mb-md-0 d-flex" iconName="star" iconText="Discover the top gainers of the stock market for today." iconHeading="Top Gainer in Day"></app-cart>
            <app-cart class="col-md-6 d-flex" iconName="savings" iconText="Discover the stocks ideal for buying, and the Market capitals favourable." iconHeading="Top Stock to Invest"></app-cart>
        </div>
    </div>
</section>
