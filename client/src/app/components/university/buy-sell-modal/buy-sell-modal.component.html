<mat-card class="example-card">
  <mat-card-header class="grad">
    <mat-card-title class="heading">{{ stock.type }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div>
      <div class="profile-details">
        <form
          [formGroup]="BuySellForm"
          (ngSubmit)="onSubmit()"
          class="example-form"
        >

          <mat-form-field
            class="example-full-width"
            appearance="fill"
            color="warn"
          >
            <mat-label>Product / SKU</mat-label>
            <input readonly matInput placeholder="Product name" formControlName="name"/>
          </mat-form-field>

          <mat-form-field
            class="example-full-width"
            appearance="fill"
            color="warn"
          >
            <mat-label>Unit Cost (₹)</mat-label>
            <input readonly matInput placeholder="Unit cost" formControlName="currPrice" />
          </mat-form-field>

          <mat-form-field
            class="example-full-width"
            appearance="fill"
            color="warn"
          >
            <mat-label>Quantity</mat-label>
            <input
              min="1"
              matInput
              type="number"
              placeholder="Number of units"
              formControlName="noOfUnits"
            />
          </mat-form-field>
          <div id="wrapper">
            <button
              mat-raised-button
              type="submit"
              [disabled]="!BuySellForm.valid"
            >
              Confirm {{ stock.type }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </mat-card-content>
</mat-card>
