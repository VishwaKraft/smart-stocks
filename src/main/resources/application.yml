spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartstocks}
    username: ${SPRING_DATASOURCE_USERNAME:smartuser}
    password: ${SPRING_DATASOURCE_PASSWORD:smartpass}
    driverClassName: "org.postgresql.Driver"
    hikari:
      data-source-properties:
        prepareThreshold: 0

  jpa:
    hibernate:
      ddl-auto: "none"
    show-sql: "false"
    properties:
      hibernate:
        temp:
          use_jdbc_metadata_defaults: "false"
        dialect: "org.hibernate.dialect.PostgreSQLDialect"

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: "/actuator"
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# OpenTelemetry Configuration
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
      protocol: http/protobuf
  resource:
    attributes:
      service.name: ${OTEL_SERVICE_NAME:smart-stocks-backend}
      service.version: ${OTEL_SERVICE_VERSION:1.0.0}
