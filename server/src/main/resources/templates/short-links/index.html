<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="icon" th:href="@{/images/img.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/css/short-links/style.css}">
</head>
<body>
<div class="sidebar">
    <div class="logo">
        <img th:src="@{/images/img.png}" alt="logo">
        <span>Smart Stocks</span>
    </div>
    <h3>My shortened URLs</h3>
    <div id="linksContainer"></div>
</div>

<div class="main">
    <h2>URL Shortener</h2>
    <form id="shortenForm" class="form">
        <div class="inputs">
            <input type="text" id="originalUrl" name="originalUrl" placeholder="Paste the URL to be shortened" required>
        </div>
        <button type="submit">Shorten URL</button>
    </form>

    <div id="shortUrlResult"></div>
</div>

<div id="deleteModal" class="modal">
    <div class="modal-content">
        <p>Are you sure you want to delete this link?</p>
        <div class="modal-buttons">
            <button id="confirmDelete">Yes, Delete</button>
            <button id="cancelDelete">Cancel</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    window.SHORT_LINK_BASE_URL = /*[[${shortLinkBaseUrl}]]*/ '/s/';
    window.API_LINKS_URL = /*[[${apiLinksUrl}]]*/ '/api/links';
</script>
<script th:src="@{/js/short-links/app.js}"></script>
</body>
</html>
