spring:
  datasource:
    url: "jdbc:postgresql://postgres:5432/smartstocks"
    username: "smartuser"
    password: "smartpass"
    driverClassName: "org.postgresql.Driver"

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        temp:
          use_jdbc_metadata_defaults: "false"
        dialect: "org.hibernate.dialect.PostgreSQLDialect"

server:
  port: 8080

app:
  short-link:
    base-url: ${SHORT_LINK_BASE_URL:http://localhost:8080/s/}
  tracking:
    base-url: ${TRACKING_BASE_URL:http://localhost:8080/tracking}

